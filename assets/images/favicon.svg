<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background (Dark Blue/Black Void) -->
    <rect width="100" height="100" rx="20" fill="#020515"/>
    
    <!-- Definitions for Gradients and Glows -->
    <defs>
        <!-- Main Body Blue Gradient (Glossy) -->
        <linearGradient id="blueGlass" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
            <stop offset="0.1" stop-color="#3b82f6"/>
            <stop offset="0.4" stop-color="#0f308e"/>
            <stop offset="0.8" stop-color="#051030"/>
        </linearGradient>

        <!-- Top Highlight (Cyan/White) -->
        <linearGradient id="topShine" x1="50" y1="0" x2="50" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#bfdbfe"/>
            <stop offset="1" stop-color="#1e40af"/>
        </linearGradient>

        <!-- Neon Pink Glow (Internal Edges) -->
        <linearGradient id="neonPink" x1="0" y1="50" x2="100" y2="50" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#d946ef"/>
            <stop offset="0.5" stop-color="#a21caf"/>
            <stop offset="1" stop-color="#701a75"/>
        </linearGradient>

        <!-- Shadow for depth -->
        <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge> 
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/> 
            </feMerge>
        </filter>
        
        <!-- Bloom Filter for Neon -->
        <filter id="neonBloom" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- GROUP: The 3D Letter E -->
    <g filter="url(#dropShadow)">

        <!-- 1. BOTTOM SECTION -->
        <!-- Main Blue Body -->
        <path d="M 30 58 C 20 58 15 65 15 75 C 15 85 25 90 40 90 L 75 90 L 85 80 L 75 70 L 40 70 C 35 70 30 68 30 65 L 30 58 Z" fill="url(#blueGlass)" stroke="#172554" stroke-width="0.5"/>
        <!-- Pink Neon Top Edge (Chamfer) -->
        <path d="M 30 58 L 40 70 L 75 70 L 85 80 L 85 76 L 75 66 L 40 66 C 32 66 30 62 30 58 Z" fill="url(#neonPink)" filter="url(#neonBloom)"/>
        <!-- Side Highlight -->
        <path d="M 15 75 C 15 85 25 90 35 90" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>


        <!-- 2. TOP SECTION -->
        <!-- Main Blue Body -->
        <path d="M 30 42 C 20 42 15 35 15 25 C 15 15 25 10 40 10 L 75 10 L 85 20 L 75 30 L 40 30 C 35 30 30 32 30 35 L 30 42 Z" fill="url(#blueGlass)" stroke="#172554" stroke-width="0.5"/>
        <!-- Top Shine Highlight (The 'Cap') -->
        <path d="M 15 25 C 15 15 25 10 40 10 L 75 10 L 80 15 L 40 15 C 28 15 20 18 20 25" fill="url(#topShine)" opacity="0.9"/>
        <!-- Pink Neon Bottom Edge (Chamfer) -->
        <path d="M 30 42 L 40 30 L 75 30 L 85 20 L 85 24 L 75 34 L 40 34 C 32 34 30 38 30 42 Z" fill="url(#neonPink)" filter="url(#neonBloom)"/>
        <!-- Bright White Highlight on Curve -->
        <path d="M 18 20 Q 22 14 30 12" stroke="white" stroke-width="2" stroke-linecap="round" filter="url(#neonBloom)"/>


        <!-- 3. MIDDLE SECTION (Floating) -->
        <!-- Main Body -->
        <path d="M 45 45 L 75 45 L 85 50 L 75 55 L 45 55 L 40 50 L 45 45 Z" fill="url(#blueGlass)"/>
        <!-- Top Pink Edge -->
        <path d="M 45 45 L 75 45 L 85 50 L 80 50 L 72 47 L 45 47 Z" fill="#d946ef" filter="url(#neonBloom)" opacity="0.8"/>
        <!-- Bottom Pink Edge -->
        <path d="M 45 55 L 75 55 L 85 50 L 80 50 L 72 53 L 45 53 Z" fill="#a21caf" filter="url(#neonBloom)" opacity="0.8"/>
        <!-- Front Face (Darker) -->
        <path d="M 45 47 L 72 47 L 80 50 L 72 53 L 45 53 L 42 50 Z" fill="#1e3a8a" opacity="0.9"/>

    </g>
</svg>

